<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Counter</title>
		<style>
			.island-counter {
				display: inline-flex;
				align-items: center;
				gap: 12px;
				padding: 16px 20px;
				background: linear-gradient(135deg, #1e293b, #0f172a);
				color: #e2e8f0;
				border-radius: 14px;
				font-family: ui-sans-serif, system-ui, sans-serif;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
				user-select: none;
			}
			.island-counter button {
				width: 40px;
				height: 40px;
				border: none;
				border-radius: 10px;
				font-size: 22px;
				font-weight: 700;
				cursor: pointer;
				background: #334155;
				color: #f8fafc;
				transition:
					transform 0.08s ease,
					background 0.15s ease;
			}
			.island-counter button:hover {
				background: #475569;
			}
			.island-counter button:active {
				transform: scale(0.92);
			}
			.island-counter .count {
				min-width: 64px;
				text-align: center;
				font-size: 28px;
				font-weight: 700;
				font-variant-numeric: tabular-nums;
			}
			.island-counter .label {
				font-size: 12px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: #94a3b8;
			}
			.island-counter .reset {
				width: auto;
				padding: 0 12px;
				font-size: 13px;
				background: transparent;
				color: #64748b;
			}
			.island-counter .reset:hover {
				background: #1e293b;
				color: #cbd5e1;
			}
		</style>
	</head>
	<body>
		<!-- Root mount — placeholder DOM, replaced at runtime. -->
		<div id="island-root">
			<div class="island-counter">
				<button data-act="dec">−</button>
				<div>
					<div class="count">0</div>
					<div class="label">clicks</div>
				</div>
				<button data-act="inc">+</button>
				<button class="reset" data-act="reset">reset</button>
			</div>
		</div>

		<!-- Data island — inert JSON. islandc replaces the body with
		     json.Marshal(d) at serve time. -->
		<script id="island-data" type="application/json">
			{
				"count": 0, // current click count
				"label": "clicks",
				"step": 1, // amount added/removed per click
				"min": -99,
				"max": 99
			}
		</script>

		<!-- Render script — pure client, rewrites #island-root. -->
		<script type="module" data-island-render>
			const data = JSON.parse(document.getElementById("island-data").textContent);
			const root = document.getElementById("island-root");

			let state = { ...data };

			const clamp = (v) => Math.max(state.min, Math.min(state.max, v));

			function render() {
				root.innerHTML = `
					<div class="island-counter">
						<button data-act="dec">−</button>
						<div>
							<div class="count">${state.count}</div>
							<div class="label">${state.label}</div>
						</div>
						<button data-act="inc">+</button>
						<button class="reset" data-act="reset">reset</button>
					</div>
				`;
			}

			root.addEventListener("click", (e) => {
				const act = e.target?.dataset?.act;
				if (!act) return;
				if (act === "inc")
					state.count = clamp(state.count + state.step);
				if (act === "dec")
					state.count = clamp(state.count - state.step);
				if (act === "reset") state.count = clamp(0);
				render();
			});

			render();
		</script>
	</body>
</html>
