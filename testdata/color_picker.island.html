<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Color Picker</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/open-props@1.7.0/open-props.min.css"
		/>
		<script
			defer
			src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
		></script>
		<style>
			.island-color {
				width: var(--size-14);
				font-family: var(--font-sans);
				background: var(--gray-9);
				color: var(--gray-2);
				border-radius: var(--radius-3);
				overflow: hidden;
				box-shadow: var(--shadow-6);
			}
			.island-color .swatch {
				height: var(--size-11);
				background: hsl(210, 80%, 55%);
				transition: background var(--ease-1) var(--time-1);
			}
			.island-color .controls {
				padding: var(--size-3);
				display: flex;
				flex-direction: column;
				gap: var(--size-3);
			}
			.island-color .row {
				display: flex;
				align-items: center;
				gap: var(--size-3);
			}
			.island-color .row label {
				width: var(--size-3);
				font-size: var(--font-size-0);
				font-weight: var(--font-weight-7);
				color: var(--gray-5);
			}
			.island-color input[type="range"] {
				flex: 1;
				accent-color: var(--indigo-6);
			}
			.island-color .val {
				width: var(--size-8);
				text-align: right;
				font-variant-numeric: tabular-nums;
				font-size: var(--font-size-1);
				color: var(--gray-3);
			}
			.island-color .hex {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: var(--size-2) var(--size-3);
				background: var(--gray-10);
				font-family: var(--font-mono);
				font-size: var(--font-size-2);
			}
			.island-color .hex button {
				border: none;
				background: var(--indigo-6);
				color: var(--indigo-0);
				padding: var(--size-1) var(--size-2);
				border-radius: var(--radius-2);
				font-size: var(--font-size-0);
				cursor: pointer;
			}
			.island-color .hex button:hover {
				background: var(--indigo-7);
			}
			.island-color .presets {
				display: flex;
				gap: var(--size-2);
				padding: 0 var(--size-3) var(--size-3);
				flex-wrap: wrap;
			}
			.island-color .presets button {
				width: var(--size-6);
				height: var(--size-6);
				border-radius: var(--radius-round);
				border: 2px solid transparent;
				cursor: pointer;
				padding: 0;
			}
			.island-color .presets button:hover {
				border-color: var(--gray-2);
			}
		</style>
	</head>
	<body>
		<!-- Root mount — placeholder DOM, replaced at runtime. -->
		<div id="island-root">
			<div class="island-color" x-data="colorPicker" x-cloak>
				<div
					class="swatch"
					:style="`background:hsl(${h}, ${s}%, ${l}%)`"
				></div>
				<div class="controls">
					<div class="row">
						<label>H</label>
						<input
							type="range"
							min="0"
							max="360"
							x-model.number="h"
						/>
						<span class="val" x-text="h"></span>
					</div>
					<div class="row">
						<label>S</label>
						<input
							type="range"
							min="0"
							max="100"
							x-model.number="s"
						/>
						<span class="val" x-text="s"></span>
					</div>
					<div class="row">
						<label>L</label>
						<input
							type="range"
							min="0"
							max="100"
							x-model.number="l"
						/>
						<span class="val" x-text="l"></span>
					</div>
				</div>
				<div class="hex">
					<span x-text="hex()"></span>
					<button
						@click="copy()"
						x-text="copied ? 'copied!' : 'copy'"
					></button>
				</div>
				<div class="presets">
					<template x-for="(p, i) in presets" :key="i">
						<button
							:style="`background:hsl(${p.h}, ${p.s}%, ${p.l}%)`"
							:title="p.name"
							@click="applyPreset(p)"
						></button>
					</template>
				</div>
			</div>
		</div>

		<!-- Data island — inert JSON. islandc replaces the body with
		     json.Marshal(d) at serve time. Trailing // comments on
		     properties become Go doc comments. -->
		<script id="island-data" type="application/json">
			{
				"h": 210, // hue 0..360
				"s": 80, // saturation 0..100
				"l": 55, // lightness 0..100
				"presets": [
					{ "name": "ocean", "h": 210, "s": 80, "l": 55 },
					{ "name": "sunset", "h": 18, "s": 90, "l": 58 },
					{ "name": "forest", "h": 140, "s": 60, "l": 45 },
					{ "name": "grape", "h": 270, "s": 65, "l": 55 },
					{ "name": "gold", "h": 45, "s": 95, "l": 55 }
				]
			}
		</script>

		<!-- 3. Alpine component factory. alpine:init fires before Alpine walks
		     the DOM, so load order between this script and the deferred Alpine
		     bundle doesn't matter. -->
		<script>
			function hslToHex(h, s, l) {
				s /= 100;
				l /= 100;
				const k = (n) => (n + h / 30) % 12;
				const a = s * Math.min(l, 1 - l);
				const f = (n) =>
					Math.round(
						255 *
							(l -
								a *
									Math.max(
										-1,
										Math.min(k(n) - 3, 9 - k(n), 1),
									)),
					);
				return (
					"#" +
					[f(0), f(8), f(4)]
						.map((x) => x.toString(16).padStart(2, "0"))
						.join("")
				);
			}

		document.addEventListener("alpine:init", () => {
			const data = JSON.parse(document.getElementById("island-data").textContent);
			window.Alpine.data("colorPicker", () => ({
				...data,
					copied: false,
					hex() {
						return hslToHex(this.h, this.s, this.l);
					},
					applyPreset(p) {
						this.h = p.h;
						this.s = p.s;
						this.l = p.l;
					},
					copy() {
						navigator.clipboard?.writeText(this.hex());
						this.copied = true;
						setTimeout(() => (this.copied = false), 800);
					},
				}));
			});
		</script>
	</body>
</html>
